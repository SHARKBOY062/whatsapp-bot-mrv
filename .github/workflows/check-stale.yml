name: Follow-up leads silenciosos

on:
  schedule:
    # A cada 5 minutos — o endpoint filtra os que estão há 30+ min sem responder
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping check-stale endpoint
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          curl -fsS --max-time 45 -X POST \
            "https://whatsapp-bot-mrv.onrender.com/check-stale?token=$WEBHOOK_SECRET"
